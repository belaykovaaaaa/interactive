<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ в образовании</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111217;
    --ink2: #3a3d4a;
    --muted: #8b8fa8;
    --rule: #dddde8;
    --bg: #f6f5f1;
    --surface: #fdfcfa;
    --blue: #2350c8;
    --blue-tint: #f0f3fd;
    --amber: #b84a00;
    --amber-tint: #fdf3ed;
    --hover-lift: 0 8px 32px rgba(17,18,23,0.08);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .page { max-width: 1280px; margin: 0 auto; padding: 80px 56px 120px; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--ink);
    padding-bottom: 40px;
    margin-bottom: 56px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 32px;
    animation: appear .8s ease both;
  }

  .header-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6.5vw, 6rem);
    font-weight: 600;
    line-height: .98;
    letter-spacing: -.02em;
  }

  h1 i {
    font-style: italic;
    font-weight: 400;
  }

  .header-right {
    text-align: right;
    padding-bottom: 4px;
  }

  .header-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.8;
    max-width: 220px;
    margin-left: auto;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    gap: 24px;
    animation: appear .8s .08s ease both;
  }

  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface);
  }

  .tab {
    padding: 11px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: background .2s, color .2s;
    border-right: 1px solid var(--rule);
    position: relative;
  }

  .tab:last-child { border-right: none; }

  .tab.active.tab-s { background: var(--blue-tint); color: var(--blue); }
  .tab.active.tab-t { background: var(--amber-tint); color: var(--amber); }
  .tab:not(.active):hover { background: #f0eeea; color: var(--ink2); }

  .search-wrap { position: relative; }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 11px 16px 11px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--ink);
    width: 280px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: .02em;
  }

  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--ink2); }

  .search-ico {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── SECTION ── */
  .section { display: none; }
  .section.active { display: block; animation: appear .4s ease both; }

  .section-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow-line {
    width: 28px; height: 1px;
  }

  .section-s .eyebrow-line { background: var(--blue); }
  .section-t .eyebrow-line { background: var(--amber); }

  .eyebrow-text {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
  }

  .section-s .eyebrow-text { color: var(--blue); }
  .section-t .eyebrow-text { color: var(--amber); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    padding: 28px 26px 24px;
    cursor: pointer;
    transition: background .2s;
    position: relative;
    animation: appear .5s ease both;
  }

  .card:hover { background: #fff; }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }

  .card-s::before { background: var(--blue); }
  .card-t::before { background: var(--amber); }
  .card:hover::before { transform: scaleX(1); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-icon {
    width: 36px; height: 36px;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .card-s .card-icon { background: var(--blue-tint); color: var(--blue); }
  .card-t .card-icon { background: var(--amber-tint); color: var(--amber); }

  .card-icon svg { width: 16px; height: 16px; stroke-width: 1.6; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

  .card-toggle {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: transform .3s, color .2s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-toggle svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

  .card.open .card-toggle { transform: rotate(45deg); }
  .card-s.open .card-toggle { color: var(--blue); }
  .card-t.open .card-toggle { color: var(--amber); }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -.01em;
    color: var(--ink);
  }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .35s ease, padding-top .3s;
    opacity: 0;
  }

  .card.open .card-body { max-height: 160px; opacity: 1; padding-top: 12px; }

  .card-body-inner {
    font-size: .78rem;
    line-height: 1.75;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    padding-top: 12px;
    font-weight: 400;
  }

  .card.hidden { display: none; }

  .card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.06s}
  .card:nth-child(3){animation-delay:.09s} .card:nth-child(4){animation-delay:.12s}
  .card:nth-child(5){animation-delay:.15s} .card:nth-child(6){animation-delay:.18s}
  .card:nth-child(7){animation-delay:.21s} .card:nth-child(8){animation-delay:.24s}
  .card:nth-child(9){animation-delay:.27s} .card:nth-child(10){animation-delay:.30s}
  .card:nth-child(n+11){animation-delay:.33s}

  /* ── FOOTER ── */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: appear .8s .3s ease both;
  }

  .footer-left {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: var(--muted);
  }

  .footer-right {
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 680px) {
    .page { padding: 48px 20px 80px; }
    header { grid-template-columns: 1fr; }
    .header-right { text-align: left; }
    .header-sub { margin-left: 0; }
    .controls { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
    footer { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <p class="header-label">Инструменты искусственного интеллекта</p>
      <h1>ИИ<br>в <i>образовании</i></h1>
    </div>
    <div class="header-right">
      <p class="header-sub">Нажмите на карточку, чтобы раскрыть описание. Переключайте разделы и используйте поиск.</p>
    </div>
  </header>

  <div class="controls">
    <div class="tabs">
      <button class="tab tab-s active" onclick="switchTab('s')">Студентам</button>
      <button class="tab tab-t" onclick="switchTab('t')">Педагогам</button>
    </div>
    <div class="search-wrap">
      <svg class="search-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-box" type="text" placeholder="Поиск по применениям…" oninput="filter(this.value)" id="q">
    </div>
  </div>

  <!-- STUDENTS -->
  <div class="section active section-s" id="sec-s">
    <div class="section-eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Для студентов</span>
    </div>
    <div class="grid" id="grid-s"></div>
  </div>

  <!-- TEACHERS -->
  <div class="section section-t" id="sec-t">
    <div class="section-eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Для педагогов</span>
    </div>
    <div class="grid" id="grid-t"></div>
  </div>

  <footer>
    <span class="footer-left">Искусственный интеллект меняет образование</span>
    <span class="footer-right">2025 · ИИ в образовании</span>
  </footer>

</div>

function buildGrid(gridId, data, cardCls) {
  const g = document.getElementById(gridId);
  data.forEach(item => {
    const c = document.createElement('div');
    c.className = `card ${cardCls}`;
    c.dataset.q = (item.title + ' ' + item.desc).toLowerCase();
    c.innerHTML = `
      <div class="card-head">
        <div class="card-icon">${icon(item.ico)}</div>
        <div class="card-toggle"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      </div>
      <div class="card-title">${item.title}</div>
      <div class="card-body"><div class="card-body-inner">${item.desc}</div></div>
    `;
    c.addEventListener('click', () => c.classList.toggle('open'));
    g.appendChild(c);
  });
}

buildGrid('grid-s', studentsData, 'card-s');
buildGrid('grid-t', teachersData, 'card-t');

function switchTab(id) {
  document.getElementById('q').value = '';
  ['s','t'].forEach(k => {
    document.getElementById('sec-'+k).classList.toggle('active', k===id);
    document.querySelector('.tab-'+k).classList.toggle('active', k===id);
  });
  document.querySelectorAll('.card').forEach(c => c.classList.remove('hidden'));
}

function filter(v) {
  v = v.toLowerCase();
  document.querySelector('.section.active .grid').querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', v.length > 0 && !c.dataset.q.includes(v));
  });
}
